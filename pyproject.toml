[project]
name = "idotmatrix"
description = "Opinion-free driver for iDotMatrix BLE pixel displays."
license = "GPL-3.0-or-later"
readme = "README.md"
requires-python = ">=3.12,<3.15"
version = "0.1.0"
classifiers = [
    "Intended Audience :: Developers",
]

dependencies = [
    "bleak>=0.22.3",
    "pillow>=11.2.1",  # text rendering and GIF adaptation are core features
]

[project.optional-dependencies]
test = [
    "pytest>=8.2.0",
    "pytest-asyncio>=1.0.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["idotmatrix*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
