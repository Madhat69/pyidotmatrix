name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[test]"

      # Failures are surfaced as ::error:: annotations and in the run's step
      # summary because GitHub hides raw job logs from anonymous viewers --
      # without this, outside contributors (and anyone triaging from the run
      # page) can only see "exit code 1".
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          pytest -q --tb=short 2>&1 | tee pytest.out || {
            status=$?
            {
              echo "## pytest failures (${{ matrix.os }} / py${{ matrix.python-version }})"
              echo '```'
              tail -n 120 pytest.out
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            grep -E "^(FAILED|ERROR)" pytest.out | head -n 10 \
              | while IFS= read -r line; do echo "::error::$line"; done
            exit "$status"
          }
